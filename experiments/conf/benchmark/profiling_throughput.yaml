name: profiling_throughput
type: throughput
iterations: 1
warmup_iterations: 0
test_duration_s: 3.0              # Reduced from 10s for fast profiling
data_size_gb: null
test_channel_counts: [1, 2, 4, 8, 16, 32, 64, 128]
test_nfft_sizes: [256, 512, 1024, 2048, 4096, 8192]
measure_memory_bandwidth: false
measure_pcie_bandwidth: false
monitor_gpu_utilization: false
monitor_temperature: false
monitor_power: false

# GPU clock locking for stable benchmarking (reduces CV by 50-75%)
lock_gpu_clocks: false  # Set to true to enable clock locking
gpu_index: 0            # GPU index to lock (use with lock_gpu_clocks)
use_max_clocks: false   # Use max clocks vs recommended (use with lock_gpu_clocks)
