# Latency benchmark configuration for execution mode comparison
# Does NOT set engine.mode - allows experiment to control it via sweep
# Based on latency.yaml but mode-agnostic

# Benchmark parameters
name: latency
type: latency
iterations: 5000
warmup_iterations: 500
confidence_level: 0.95
outlier_threshold: 3.0
measure_gpu_time: true
measure_components: false
test_signal_type: sine
test_frequency: 1000.0
deadline_us: 200.0
analyze_jitter: true
save_raw_data: true

# GPU clock locking for stable benchmarking (reduces CV by 50-75%)
lock_gpu_clocks: false  # Set to true to enable clock locking
gpu_index: 0            # GPU index to lock (use with lock_gpu_clocks)
use_max_clocks: false   # Use max clocks vs recommended (use with lock_gpu_clocks)
