# Throughput benchmark configuration
# Mode-agnostic: execution mode comes from the engine config selected by
# the experiment.

# Benchmark parameters
name: throughput
type: throughput
iterations: 1
warmup_iterations: 1               # Single warmup iteration (duration controlled by warmup_duration_s)
warmup_duration_s: 3.0             # Warmup duration: 3 seconds to absorb GPU cold-start bias
test_duration_s: 10.0              # Reduced from 30s for faster iteration
data_size_gb: null
test_channel_counts: [1, 2, 4, 8, 16, 32, 64, 128]
test_nfft_sizes: [256, 512, 1024, 2048, 4096, 8192]
measure_memory_bandwidth: false    # Disabled by default to prevent hanging
measure_pcie_bandwidth: false      # Disabled by default to prevent hanging
monitor_gpu_utilization: false     # Disabled by default to prevent hanging
monitor_temperature: false         # Disabled by default to prevent hanging
monitor_power: false               # Disabled by default to prevent hanging

# GPU clock locking for stable benchmarking (reduces CV by 50-75%)
lock_gpu_clocks: false  # Set to true to enable clock locking
gpu_index: 0            # GPU index to lock (use with lock_gpu_clocks)
use_max_clocks: false   # Use max clocks vs recommended (use with lock_gpu_clocks)
