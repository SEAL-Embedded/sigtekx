# Latency benchmark configuration
# Use BATCH mode for single-frame latency measurement (discrete frame processing)
# For continuous streaming latency, use latency_streaming.yaml instead
engine:
  mode: batch

# Benchmark parameters
name: latency
type: latency
iterations: 5000
warmup_iterations: 500
confidence_level: 0.95
outlier_threshold: 3.0
measure_gpu_time: true
measure_components: false  # Enable per-stage timing (adds GPU event overhead ~1-2µs/stage)
test_signal_type: sine
test_frequency: 1000.0
deadline_us: 200.0
analyze_jitter: true
save_raw_data: true

# GPU clock locking for stable benchmarking (reduces CV by 50-75%)
lock_gpu_clocks: false  # Set to true to enable clock locking
gpu_index: 0            # GPU index to lock (use with lock_gpu_clocks)
use_max_clocks: false   # Use max clocks vs recommended (use with lock_gpu_clocks)