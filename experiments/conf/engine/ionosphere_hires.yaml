# High-resolution ionosphere analysis engine
# Optimized for fine frequency resolution and ionospheric scintillation analysis
name: ionosphere_hires
nfft: 8192                    # High frequency resolution for detailed spectral analysis
batch: 16                     # Moderate batch size for memory efficiency
overlap: 0.75                 # High overlap for temporal resolution
sample_rate_hz: 48000         # Standard ionosphere monitoring rate
stream_count: 4               # Multiple streams for parallel processing
pinned_buffer_count: 4        # Sufficient buffers for high-resolution processing
warmup_iters: 20              # More warmup for stable high-res measurements
timeout_ms: 8000              # Extended timeout for larger FFTs
use_cuda_graphs: false        # Disabled for flexibility in parameter variations
enable_profiling: false       # Disabled by default for production use