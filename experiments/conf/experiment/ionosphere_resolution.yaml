# @package _global_
defaults:
  - override /engine: ionosphere_hires

experiment:
  name: ionosphere_resolution
  description: Sweep over high NFFT values for ionosphere frequency resolution analysis
  tags: [ionosphere, resolution, frequency]

# Multirun configuration for NFFT resolution study
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      engine.nfft: 4096,8192,16384,32768
      engine.overlap: 0.5,0.75,0.875

# Analysis configuration
analysis:
  statistical_tests: [shapiro, kruskal]
  confidence_level: 0.95
  min_samples: 50
  focus_metrics: [frequency_resolution, computational_cost, memory_usage]

# Ionosphere-specific parameters
ionosphere:
  frequency_bands: [hf, vhf, uhf]  # 3-30MHz, 30-300MHz, 300-3000MHz
  scintillation_indices: [s4, sigma_phi]
  analysis_window_s: 60.0
  minimum_elevation_deg: 10.0