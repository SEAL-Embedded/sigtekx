# @package _global_

# Baseline Latency 100kHz (BATCH mode)
# =====================================
# General-purpose BATCH mode latency characterization at 100kHz for methods paper.
# Currently only have 48kHz STREAMING latency - this fills the BATCH mode gap
# for academic publication positioning.
#
# Measures per-frame processing latency without ring buffer overhead.

defaults:
  - override /engine: academic_100k

experiment:
  name: baseline_latency_100k
  description: >-
    Baseline BATCH mode latency characterization at 100kHz sample rate.
    General-purpose academic benchmarking for methods paper,
    measuring discrete frame processing latency without streaming overhead.
  tags: [baseline, latency, batch, academic, 100khz, methods-paper]
  experiment_group: baseline
  sample_rate_category: 100kHz

# Multirun configuration
# 5 NFFT × 3 channels × 1 overlap = 15 configurations
# NFFT range: 1024-16384 (typical academic range)
# Channels: 1, 2, 8 (single, stereo, multi-channel)
# Overlap: 0.0 (BATCH mode typically uses zero overlap)
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      # NFFT sweep for academic baseline
      # 1024: Small frames, low latency
      # 2048: Common STFT size
      # 4096: Balanced resolution
      # 8192: High frequency resolution
      # 16384: Very high resolution
      engine.nfft: 1024,2048,4096,8192,16384

      # Channel sweep: single to multi-channel
      # 1: Single channel (baseline)
      # 2: Stereo (common use case)
      # 8: Multi-channel (typical array size)
      engine.channels: 1,2,8

      # Zero overlap for BATCH mode (discrete frames)
      engine.overlap: 0.0

      # BATCH mode (discrete frame processing)
      engine.mode: batch

# Analysis configuration
analysis:
  statistical_tests: [shapiro, kruskal, mann_whitney]
  confidence_level: 0.95
  min_samples: 100

  # Latency focus metrics
  focus_metrics:
    - mean_latency_us          # PRIMARY: average latency
    - p50_latency_us           # Median latency
    - p95_latency_us           # 95th percentile
    - p99_latency_us           # 99th percentile (tail latency)
    - latency_cv               # Coefficient of variation (stability)
    - min_latency_us           # Best-case latency
    - max_latency_us           # Worst-case latency

  # Latency thresholds (soft targets for academic baseline)
  thresholds:
    max_mean_latency_ms: 100   # <100ms for soft real-time
    max_p99_latency_ms: 200    # <200ms tail latency
    max_latency_cv: 0.20       # <20% CV for stable performance

# Academic baseline parameters
academic:
  sample_rate_hz: 100000       # 100kHz (common academic sample rate)
  use_case: general_purpose    # Not domain-specific
  publication_target: methods_paper
  comparison_baseline: numpy_scipy  # Compare against offline processing

# Performance expectations (soft real-time targets)
expectations:
  soft_realtime:
    rtf_target: "≤0.33"       # 3× headroom for I/O and overhead
    latency_target: "<10ms"   # Per-frame processing
  real_time:
    rtf_target: "≤1.0"        # Real-time capable
    latency_target: "<frame_duration"
