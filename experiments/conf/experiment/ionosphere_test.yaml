# @package _global_
defaults:
  - override /engine: ionosphere_realtime

experiment:
  name: ionosphere_test
  description: Fast test version of ionosphere resolution analysis
  tags: [ionosphere, test, quick]
  experiment_group: profiling

# Lightweight multirun for testing
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      engine.nfft: 1024,2048
      engine.overlap: 0.5,0.75

# Analysis configuration
analysis:
  statistical_tests: [shapiro]
  confidence_level: 0.95
  min_samples: 10
  focus_metrics: [frequency_resolution]

# Ionosphere-specific parameters
ionosphere:
  frequency_bands: [hf]
  scintillation_indices: [s4]
  analysis_window_s: 10.0
  minimum_elevation_deg: 10.0