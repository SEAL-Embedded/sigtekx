# @package _global_

# Ionosphere Test — realistic STREAMING workload for fast iteration
# =================================================================
# Quick-to-run experiment that exercises representative ionosphere streaming
# parameters (48kHz, 2-ch dual-antenna array, mid-to-high NFFT, high overlap).
# Intended as the default "run iono in streaming mode" entry point. For the
# batch equivalent see ionosphere_test_batch.yaml.

defaults:
  - override /engine: ionosphere_48k_streaming

experiment:
  name: ionosphere_test
  description: >-
    Representative STREAMING ionosphere workload (48kHz, 2-ch) at
    realistic NFFT/overlap. Small sweep for fast developer iteration.
  tags: [ionosphere, streaming, test, quick]
  experiment_group: ionosphere
  sample_rate_category: 48kHz

# Small but representative sweep — 2 NFFT × 2 overlap = 4 configurations
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      # Streaming NFFT range (real-time capable)
      engine.nfft: 4096,8192

      # High-overlap range (temporal resolution for iono phenomena)
      engine.overlap: 0.875,0.9375

      # Dual-channel antenna array (E-W + N-S)
      engine.channels: 2

# Analysis configuration
analysis:
  statistical_tests: [shapiro]
  confidence_level: 0.95
  min_samples: 10
  focus_metrics: [frequency_resolution, rtf, mean_latency_us]

# Ionosphere-specific parameters
ionosphere:
  frequency_bands: [vlf, ulf]
  analysis_window_s: 10.0
  minimum_elevation_deg: 10.0
