# @package _global_
# Ionosphere Streaming Latency Sweep (Dual-Channel)
# ===================================================
# Dual-channel streaming latency benchmarks for real-time ionosphere monitoring.
# Focuses on 4096 and 8192 NFFT for real-time capable configurations.

defaults:
  - override /engine: ionosphere_realtime  # streaming mode executor

experiment:
  name: ionosphere_streaming_latency_dual
  description: >-
    Dual-channel streaming latency analysis for real-time ionosphere monitoring.
    Tests 4096 and 8192 NFFT with streaming executor to characterize
    per-frame processing latency and real-time capabilities.
  tags: [ionosphere, streaming, latency, dual-channel, realtime]

# Hydra multirun configuration for parameter sweep
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      # Real-time capable NFFT values
      # 4096: Standard real-time (balanced resolution)
      # 8192: High-resolution real-time (Schumann, SIDs)
      engine.nfft: 4096,8192

      # Overlap sweep for temporal resolution analysis
      # 0.5: Lower computational load
      # 0.625: Standard ionosphere real-time
      # 0.75: Better temporal resolution
      # 0.875: High temporal resolution
      engine.overlap: 0.5,0.625,0.75,0.875

      # Fixed dual-channel configuration (E-W, N-S antenna pair)
      engine.channels: 2

# Analysis configuration
analysis:
  statistical_tests: [shapiro, kruskal, mann_whitney]
  confidence_level: 0.95
  min_samples: 5000  # High iteration count for latency measurement

  focus_metrics:
    - mean_latency_us    # Mean per-frame latency
    - p95_latency_us     # 95th percentile
    - p99_latency_us     # 99th percentile (tail latency)

  thresholds:
    max_mean_latency_us: 5000   # <5ms mean for real-time
    max_p99_latency_us: 10000   # <10ms worst-case

# Dual-channel antenna system parameters (metadata)
antenna_system:
  configuration: ew_ns_pair      # East-West, North-South dipole pair
  baseline_m: 100                # Antenna separation (meters)
  direction_finding: true        # Primary use case
  processing_mode: streaming     # Real-time processing

  # Real-time ionosphere phenomena targets
  target_phenomena:
    - lightning_sprites          # Requires <10ms latency
    - sids                       # Sudden Ionospheric Disturbances
    - schumann_resonances        # 8Hz, 14Hz, 20Hz detection
    - whistlers                  # Dispersive VLF signals
    - general_vlf                # General VLF monitoring
