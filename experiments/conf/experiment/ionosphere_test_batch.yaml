# @package _global_

# Ionosphere Test — realistic BATCH workload for fast iteration
# =============================================================
# Quick-to-run experiment that exercises representative ionosphere batch
# parameters (48kHz, 2-ch dual-antenna array, high NFFT, high overlap).
# For the streaming equivalent see ionosphere_test.yaml.

defaults:
  - override /engine: ionosphere_48k

experiment:
  name: ionosphere_test_batch
  description: >-
    Representative BATCH ionosphere workload (48kHz, 2-ch) at
    high NFFT/overlap. Small sweep for fast developer iteration.
  tags: [ionosphere, batch, test, quick]
  experiment_group: ionosphere
  sample_rate_category: 48kHz

# Small but representative sweep — 3 NFFT × 2 overlap = 6 configurations
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      # Batch NFFT range (offline / high-resolution processing)
      engine.nfft: 8192,16384,32768

      # High-overlap range (temporal resolution for iono phenomena)
      engine.overlap: 0.875,0.9375

      # Dual-channel antenna array (E-W + N-S)
      engine.channels: 2

# Analysis configuration
analysis:
  statistical_tests: [shapiro]
  confidence_level: 0.95
  min_samples: 10
  focus_metrics: [frequency_resolution, gb_per_second, frames_per_second]

# Ionosphere-specific parameters
ionosphere:
  frequency_bands: [vlf, ulf, elf]
  analysis_window_s: 10.0
  minimum_elevation_deg: 10.0
