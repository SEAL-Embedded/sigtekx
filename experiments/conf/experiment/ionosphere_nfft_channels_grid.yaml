# @package _global_
# Comprehensive NFFT × Channels Grid for General Performance Report
# ===================================================================
# Systematic sweep of NFFT and channel counts to fill heatmap gaps.
# Complements ionosphere experiments (which focus on dual-channel=2).

defaults:
  - override /engine: throughput  # batch mode for consistent scaling analysis

experiment:
  name: ionosphere_nfft_channels_grid
  description: >-
    Comprehensive NFFT × channels grid sweep for multi-channel scaling analysis.
    Fills gaps in general performance report heatmaps. Tests ionosphere-relevant
    NFFT range (4096-32768) across full channel spectrum (2-128).
  tags: [ionosphere, grid, multi-channel, scaling, general-report]

# Hydra multirun configuration for full grid sweep
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      # Ionosphere-relevant NFFT range (high resolution)
      # 4096: Standard ionosphere processing
      # 8192: High-resolution ionosphere
      # 16384: Ultra-high-resolution VLF/ULF
      # 32768: Maximum resolution (Schumann, missile detection)
      engine.nfft: 4096,8192,16384,32768

      # Full multi-channel range (powers of 2 from 2 to 128)
      # 2: Dual-channel antenna (ionosphere standard)
      # 4: Quad-channel polarization
      # 8: Small array
      # 16: Medium array
      # 32: Large array
      # 64: Very large array
      # 128: Maximum array size
      engine.channels: 2,4,8,16,32,64,128

      # Fixed overlap for consistent scaling comparison
      engine.overlap: 0.75

# Analysis configuration
analysis:
  statistical_tests: [shapiro, kruskal]
  confidence_level: 0.95
  min_samples: 30

  focus_metrics:
    - frames_per_second  # Throughput scaling
    - gb_per_second      # Memory bandwidth scaling
    - gpu_utilization    # GPU efficiency scaling

  thresholds:
    min_fps: 10          # Minimum acceptable throughput (very lenient for high NFFT)
    min_rtf: 0.1         # Real-time factor (lenient for large configs)

# Grid coverage notes
grid:
  total_combinations: 28  # 4 NFFT × 7 channels
  fills_gaps:
    - "(4096, 4), (4096, 8), (4096, 64), (4096, 128)"
    - "(8192, 4), (8192, 8), (8192, 32), (8192, 64), (8192, 128)"
    - "(16384, 4), (16384, 8), (16384, 32), (16384, 64), (16384, 128)"
    - "(32768, 4), (32768, 8), (32768, 16), (32768, 32), (32768, 64), (32768, 128)"

  complements_experiments:
    - ionosphere_streaming: channels=2 only (realtime)
    - ionosphere_batch_throughput: channels=2 only (batch)
    - ionosphere_temporal: fixed NFFT, varies channels [16,32,64,128]
    - ionosphere_resolution: fixed channels, varies NFFT [4096-32768]

notes: >-
  This experiment fills the NFFT × channels grid for the general performance report.
  The ionosphere-specific experiments correctly focus on dual-channel (channels=2)
  antenna systems. This grid provides comprehensive multi-channel scaling analysis
  for the general report's heatmaps and scaling sections.
