# @package _global_

# Ionosphere Streaming Throughput (48kHz STREAMING mode)
# =======================================================
# Dual-channel sustained throughput in STREAMING mode for continuous
# real-time monitoring. Fills data gap - all existing throughput tests use BATCH mode.
#
# This experiment measures sustained frames per second in continuous streaming
# to validate real-time processing capability with ring buffer management overhead.

defaults:
  - override /engine: ionosphere_48k

experiment:
  name: ionosphere_streaming_throughput
  description: >-
    Dual-channel sustained throughput in STREAMING mode at 48kHz.
    Measures continuous processing capability with ring buffer overhead
    for real-time ionosphere monitoring applications.
  tags: [ionosphere, streaming, throughput, sustained, realtime, dual-channel]
  experiment_group: ionosphere
  sample_rate_category: 48kHz

# Multirun configuration
# 4 NFFT × 3 overlap = 12 configurations
# NFFT range: 2048-16384 (covers typical ionosphere use cases)
# Overlap: 0.5-0.875 (temporal resolution vs computational load)
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      # NFFT sweep for ionosphere phenomena
      # 2048: Lightning/sprites (fast transients)
      # 4096: Standard ionosphere real-time
      # 8192: High resolution VLF/ULF
      # 16384: Schumann resonances (high-res streaming)
      engine.nfft: 2048,4096,8192,16384

      # Overlap sweep: temporal resolution trade-off
      # 0.5: Lower computational load
      # 0.75: Balanced (common choice)
      # 0.875: High temporal resolution
      engine.overlap: 0.5,0.75,0.875

      # Fixed dual-channel configuration (E-W and N-S antennas)
      engine.channels: 2

      # Override to STREAMING mode (throughput benchmark defaults to BATCH)
      engine.mode: streaming

# Analysis configuration
analysis:
  statistical_tests: [shapiro, kruskal]
  confidence_level: 0.95
  min_samples: 50

  # Streaming throughput focus metrics
  focus_metrics:
    - frames_per_second         # Primary: sustained FPS
    - gb_per_second            # Bandwidth utilization
    - rtf                      # Real-time factor (must be <1.0)
    - mean_latency_ms          # Processing latency
    - frame_time_cv            # Timing stability (CV)

  # Streaming performance thresholds
  thresholds:
    min_fps: 10.0              # Minimum sustained throughput
    max_rtf: 1.0               # Must be real-time capable
    max_frame_time_cv: 0.15    # 15% CV for stable streaming

# Ionosphere monitoring parameters
ionosphere:
  sample_rate_hz: 48000
  frequency_bands: [vlf, ulf, elf]
  target_phenomena:
    - lightning_sprites        # Fast transients
    - schumann_resonances      # ELF (7.8Hz, 14Hz, 20Hz)
    - sids                     # Sudden Ionospheric Disturbances
    - whistlers                # VLF dispersive signals
  continuous_monitoring: true  # STREAMING mode required
