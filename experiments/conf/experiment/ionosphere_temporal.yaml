# @package _global_
defaults:
  - override /engine: ionosphere_longterm

experiment:
  name: ionosphere_temporal
  description: Focus on temporal characteristics and overlap parameter optimization for ionosphere analysis
  tags: [ionosphere, temporal, overlap, scintillation]

# Multirun configuration for temporal analysis study
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      engine.overlap: 0.25,0.5,0.625,0.75,0.875,0.9375
      engine.batch: 16,32,64,128

# Analysis configuration
analysis:
  statistical_tests: [shapiro, kruskal, autocorrelation]
  confidence_level: 0.95
  min_samples: 100
  focus_metrics: [temporal_resolution, phase_coherence, scintillation_detection]

# Ionosphere temporal analysis parameters
ionosphere:
  temporal_scales: [fast, medium, slow]  # ms, seconds, minutes
  coherence_time_s: [0.1, 1.0, 10.0]
  fade_duration_analysis: true
  phase_tracking: true
  amplitude_scintillation: true

# Extended observation parameters
observation:
  duration_minutes: 30
  sampling_strategy: continuous
  event_detection_threshold: 2.0  # sigma for scintillation events