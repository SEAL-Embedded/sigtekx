# @package _global_
# Schumann Resonances Detection (Ultra-High Frequency Resolution)
# =================================================================
# Optimized for fine spectral detail in VLF/ULF ionosphere monitoring.
# Uses ultra-high NFFT values (65536, 131072) for <0.5Hz frequency resolution.

defaults:
  - override /engine: throughput  # batch mode for large FFT processing

experiment:
  name: ionosphere_schumann
  description: >-
    Ultra-high frequency resolution configuration for Schumann resonances detection
    in VLF/ULF ionosphere monitoring (48 kHz sampling). Uses very large NFFT
    values (65536, 131072) to achieve <0.5Hz frequency resolution required for
    resolving Earth's resonant cavity modes. Time resolution is sacrificed for
    maximum spectral precision.
  tags: [ionosphere, schumann, resonances, ultra-high-nfft, spectral-detail, vlf-ulf]

# Hydra multirun configuration
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      # Ultra-high NFFT for fine spectral detail at 48 kHz
      # 65536: 0.732 Hz frequency resolution (marginal for Schumann)
      # 131072: 0.366 Hz frequency resolution (optimal for Schumann)
      engine.nfft: 65536,131072

      # Overlap sweep for spectral averaging
      # 0.5: Standard 50% overlap
      # 0.75: High spectral coverage
      # 0.875: Maximum spectral averaging (long-term stable signal)
      engine.overlap: 0.5,0.75,0.875

      # Dual-channel antenna system (E-W, N-S pair)
      engine.channels: 2

      # Fixed VLF/ULF sampling rate
      engine.sample_rate_hz: 48000

# Analysis configuration
analysis:
  statistical_tests: [shapiro]
  confidence_level: 0.95
  min_samples: 10  # Slow iterations due to huge NFFT

  focus_metrics:
    - freq_resolution_hz  # Primary: must be <0.5Hz
    - frames_per_second   # Throughput (will be low)
    - rtf                 # Real-time factor
    - gb_per_second       # Memory bandwidth

  thresholds:
    max_freq_resolution_hz: 0.5  # Critical for Schumann detection
    min_fps: 1                    # Very lenient for large FFT

# Schumann resonances parameters (VLF/ULF ionosphere)
schumann:
  target_modes:
    - mode_1: 7.83_Hz   # Fundamental mode (most prominent)
    - mode_2: 14.3_Hz   # Second harmonic
    - mode_3: 20.8_Hz   # Third harmonic
    - mode_4: 27.3_Hz   # Fourth harmonic
    - mode_5: 33.8_Hz   # Fifth harmonic

  time_scale: hours_to_days  # Slow, persistent phenomena
  freq_precision: sub_Hz     # Need to resolve <0.5Hz peaks

  physical_origin: earth_ionosphere_cavity  # Global resonance modes

  # At 48 kHz sampling with NFFT=131072:
  # - Freq resolution: 0.366 Hz (excellent for resolving resonant peaks)
  # - Time resolution: 2730.67 ms = 2.73 seconds (poor, but acceptable - Schumann is persistent)

notes: >-
  NFFT=131072 provides 0.366Hz frequency resolution at 48kHz sampling, ideal
  for resolving Schumann resonance peaks in VLF/ULF ionosphere monitoring.
  Time resolution will be very poor (~2.7 seconds) but this is acceptable -
  Schumann resonances are persistent "Earth hum" signals that last for hours
  to days.

  This configuration also satisfies SID (Sudden Ionospheric Disturbance)
  detection requirements, which need <1Hz frequency resolution to track
  narrowband VLF transmitter signals affected by ionosphere changes.

  Complements fast-transient experiments (lightning) by covering the
  slow-persistent detection regime that requires sub-Hz frequency resolution.
