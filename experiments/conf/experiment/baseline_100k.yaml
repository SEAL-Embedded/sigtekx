# @package _global_

# Baseline 100kHz Performance Characterization
# =============================================
# Academic general-purpose benchmarking at 100kHz with full parameter coverage.
# Part of baseline experiment group.

defaults:
  - override /engine: academic_100k

experiment:
  name: baseline_100k
  description: >-
    General performance characterization at 100kHz (full coverage).
    Part of baseline experiment group with baseline_48k.
  tags: [baseline, 100kHz, academic, publication]
  experiment_group: baseline
  sample_rate_category: 100kHz

# Multirun configuration
# 3 NFFT × 3 channels × 1 overlap = 9 configurations
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      engine.nfft: 2048,4096,8192
      engine.channels: 2,8,32
      engine.overlap: 0.5

# Analysis configuration
analysis:
  statistical_tests: [shapiro, kruskal]
  confidence_level: 0.95
  min_samples: 30
  focus_metrics: [latency, throughput, rtf, gpu_utilization]
