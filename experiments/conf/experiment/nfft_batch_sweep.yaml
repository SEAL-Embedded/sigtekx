# @package _global_
defaults:
  - override /engine: realtime

experiment:
  name: nfft_batch_sweep
  description: Systematic sweep of NFFT and batch size parameters for performance characterization
  tags: [sweep, performance, nfft, batch]

# Multirun configuration for comprehensive parameter sweep
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      engine.nfft: 512,1024,2048,4096,8192
      engine.batch: 1,2,4,8,16,32

# Analysis configuration
analysis:
  statistical_tests: [shapiro, kruskal]
  confidence_level: 0.95
  min_samples: 30
  focus_metrics: [latency, throughput, accuracy, memory_usage]

# Performance characterization parameters
performance:
  measure_scaling: true
  identify_bottlenecks: true
  optimization_target: latency  # or throughput, accuracy
  resource_constraints:
    max_memory_gb: 8
    max_latency_ms: 10
    min_throughput_fps: 100