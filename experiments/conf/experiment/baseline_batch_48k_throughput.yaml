# @package _global_

# Baseline BATCH Throughput 48kHz
# =================================
# General-purpose BATCH mode throughput characterization at 48kHz.
# Comprehensive coverage at ionosphere sample rate (not specialized for phenomena).
#
# Measures maximum offline processing speed (frames per second).

defaults:
  - override /engine: ionosphere_48k

experiment:
  name: baseline_batch_48k_throughput
  description: >-
    Baseline BATCH mode throughput at 48kHz. General-purpose ionosphere
    sample rate characterization (not specialized for phenomena).
  tags: [baseline, batch, throughput, 48khz, general]
  experiment_group: baseline
  sample_rate_category: 48kHz

# Multirun configuration
# 5 NFFT × 3 channels × 3 overlap = 45 configurations
# NFFT range: 1024-16384 (typical range)
# Channels: 1, 2, 8 (single, stereo, multi-channel)
# Overlap: 0.0, 0.5, 0.75 (zero, medium, high)
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      # NFFT sweep for baseline
      # 1024: Small frames, low latency
      # 2048: Common STFT size
      # 4096: Balanced resolution
      # 8192: High frequency resolution
      # 16384: Very high resolution
      engine.nfft: 1024,2048,4096,8192,16384

      # Channel sweep: single to multi-channel
      # 1: Single channel (baseline)
      # 2: Stereo (common use case)
      # 8: Multi-channel (typical array size)
      engine.channels: 1,2,8

      # Overlap sweep: processing trade-offs
      # 0.0: Zero overlap (discrete frames)
      # 0.5: 50% overlap (standard processing)
      # 0.75: 75% overlap (high temporal coverage)
      engine.overlap: 0.0,0.5,0.75

      # BATCH mode (discrete frame processing)
      engine.mode: batch

# Analysis configuration
analysis:
  statistical_tests: [shapiro, kruskal, mann_whitney]
  confidence_level: 0.95
  min_samples: 100

  # Throughput focus metrics
  focus_metrics:
    - frames_per_second       # PRIMARY: throughput
    - gb_per_second          # Memory bandwidth
    - mean_latency_us        # Per-frame latency
    - cpu_utilization        # CPU overhead
    - gpu_utilization        # GPU utilization

  # Throughput targets (soft targets for baseline)
  thresholds:
    min_fps_1024: 10000      # >10k FPS for small frames
    min_fps_16384: 100       # >100 FPS for large frames
    max_cpu_utilization: 0.50  # <50% CPU usage

# Baseline parameters at 48kHz
baseline:
  sample_rate_hz: 48000        # 48kHz (ionosphere sample rate)
  use_case: general_purpose    # Not domain-specific
  comparison_baseline: numpy_scipy  # Compare against offline processing

# Performance expectations
expectations:
  small_frames:
    nfft: 1024
    target_fps: ">10000"
  large_frames:
    nfft: 16384
    target_fps: ">100"
