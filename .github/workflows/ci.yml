# .github/workflows/ci.yml

name: CI Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  cpu-checks:
    name: CPU Checks (Lint, Build, Test)
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install CUDA Toolkit using a dedicated Action
      - name: Install CUDA Toolkit 13.0
        uses: Jimver/cuda-toolkit@v0.2.11
        id: cuda-toolkit
        with:
          cuda: '13.0.0'

      # 4. Configure the build with CMake
      - name: Configure CMake
        run: cmake -S . -B build -DIONO_WITH_TESTS=OFF

      # 5. Build the C++/CUDA extension
      - name: Build C++ Extension
        run: cmake --build build --config Release

      # 6. Install Python dependencies
      - name: Install Python Dependencies
        run: pip install .[dev]

      # 7. Run linter
      - name: Run Ruff Linter
        run: ruff check python/src python/tests

      # 8. Run Python unit tests (excluding GPU tests)
      - name: Run Pytest (CPU-only)
        run: pytest -m "not gpu"