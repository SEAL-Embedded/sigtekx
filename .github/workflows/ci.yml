# .github/workflows/ci.yml

name: CI Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  main-ci-checks:
    name: Lint, Test, Scan, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        run: |
          echo "Initial free space:"
          df -h
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          echo "Free space after cleanup:"
          df -h
          
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 1: Build the 'builder' stage as our CI image and scan it
      - name: Build and Scan CI Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: builder
          tags: kevinrhz/ionosense-hpc:ci
          # Load the image into the runner's docker daemon
          load: true
          # Use a specific cache for the CI build
          cache-from: type=registry,ref=kevinrhz/ionosense-hpc:ci-cache
          cache-to: type=registry,ref=kevinrhz/ionosense-hpc:ci-cache,mode=max
          # Integrate Trivy scan directly into the build
          scan-with: trivy
          scan-args: |
            --severity CRITICAL,HIGH
            --vuln-type os,library
            --ignore-unfixed

      # Step 2: Use the CI image to run the linter
      - name: Run Ruff Linter
        run: docker run --rm kevinrhz/ionosense-hpc:ci ruff check python/

      # Step 3: Use the same CI image to run CPU-only tests
      - name: Run Pytest (CPU-Only)
        run: docker run --rm kevinrhz/ionosense-hpc:ci pytest -m "not gpu" --cov-fail-under=70

      # Step 4 (Optional): Build and push the final, small production image
      - name: Build and Push Production Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          # No 'target' specified, so it builds the final stage by default
          push: true
          tags: kevinrhz/ionosense-hpc:latest
          cache-from: type=registry,ref=kevinrhz/ionosense-hpc:prod-cache
          cache-to: type=registry,ref=kevinrhz/ionosense-hpc:prod-cache,mode=max