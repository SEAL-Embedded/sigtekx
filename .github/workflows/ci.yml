# .github/workflows/ci.yml

name: CI Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  main-ci-checks:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        run: |
          echo "Initial free space:"
          df -h
          sudo rm -rf /usr/local/lib/android /opt/ghc
          echo "Free space after cleanup:"
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 1: Build and PUSH the 'builder' stage as our CI image.
      - name: Build and Push CI Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: builder
          push: true
          tags: kevinrhz/ionosense-hpc:ci
          cache-from: type=registry,ref=kevinrhz/ionosense-hpc:ci-cache
          cache-to: type=registry,ref=kevinrhz/ionosense-hpc:ci-cache,mode=max

      # Step 2: Pull the CI image from the registry and run the linter.
      - name: Run Ruff Linter
        run: |
          docker pull kevinrhz/ionosense-hpc:ci
          docker run --rm kevinrhz/ionosense-hpc:ci ruff check python/

      # Step 3: Use the already-pulled image to run tests.
      - name: Run Pytest (CPU-Only)
        run: docker run --rm kevinrhz/ionosense-hpc:ci pytest -m "not gpu" --cov-fail-under=70