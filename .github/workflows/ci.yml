# .github/workflows/ci.yml

name: CI Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  docker-checks:
    name: Docker Checks (Lint, Build, Test)
    runs-on: ubuntu-latest

    steps:
      # 1. Check out repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Cache Docker layers
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # 4. Build the Docker image
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: kevinrhz/ionosense-hpc:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # This will only be executed after the cache is saved
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # 5. Run linter
      - name: Run Ruff Linter
        run: docker run --rm kevinrhz/ionosense-hpc:ci ruff check python/

      # 6. Configure and Build C++
      - name: Configure and Build C++
        run: |
          docker run --rm -v ${{ github.workspace }}:/app kevinrhz/ionosense-hpc:ci cmake --preset ci-linux
          docker run --rm -v ${{ github.workspace }}:/app kevinrhz/ionosense-hpc:ci cmake --build --preset ci-linux-build

      # 7. Run Python unit tests
      - name: Run Pytest
        run: docker run --rm kevinrhz/ionosense-hpc:ci pytest -m "not gpu" --cov-fail-under=70