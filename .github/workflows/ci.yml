# .github/workflows/ci.yml

name: CI Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  main-ci-checks:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 1: Build and PUSH the CI image. No 'load: true'.
      - name: Build and Push CI Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: builder
          push: true
          tags: kevinrhz/ionosense-hpc:ci
          cache-from: type=registry,ref=kevinrhz/ionosense-hpc:ci-cache
          cache-to: type=registry,ref=kevinrhz/ionosense-hpc:ci-cache,mode=max

      # Step 2: Run the Trivy scan on the image in the registry.
      - name: Scan CI Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'kevinrhz/ionosense-hpc:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Step 3: PULL the CI image and run the linter.
      - name: Run Ruff Linter
        run: |
          docker pull kevinrhz/ionosense-hpc:ci
          docker run --rm kevinrhz/ionosense-hpc:ci ruff check python/

      # Step 4: Use the already-pulled CI image to run tests.
      - name: Run Pytest (CPU-Only)
        run: docker run --rm kevinrhz/ionosense-hpc:ci pytest -m "not gpu" --cov-fail-under=70