# .github/workflows/ci.yml

name: CI Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  cpu-checks:
    name: CPU Checks (Lint, Build, Test)
    runs-on: ubuntu-latest

    steps:
      # 1. Check out repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Cache the CUDA Toolkit installation itself
      - name: Cache CUDA Toolkit
        id: cache-cuda
        uses: actions/cache@v4
        with:
          path: /usr/local/cuda-13.0
          key: ${{ runner.os }}-cuda-13.0

      # 4. Install CUDA Toolkit ONLY if the cache was not found
      - name: Install CUDA Toolkit
        if: steps.cache-cuda.outputs.cache-hit != 'true'
        uses: Jimver/cuda-toolkit@v0.2.27 # needs 0.2.27 or higher for cuda 13
        with:
          cuda: '13.0.0'
      
      # 5. Install build-time Python dependencies
      - name: Install Build Dependencies
        run: pip install pybind11

      # 6. Configure and Build C++ using Presets
      - name: Build C++
        uses: lukka/run-cmake@v10
        with:
          configurePreset: 'ci-linux'
          buildPreset: 'ci-linux-build'

      # 7. Install Python runtime dependencies
      - name: Install Python Dependencies
        run: pip install .[dev]

      # 8. Run linter
      - name: Run Ruff Linter
        run: ruff check python/

      # 9. Run Python unit tests with adjusted coverage
      - name: Run Pytest (CPU-only)
        run: pytest -m "not gpu" --cov-fail-under=70