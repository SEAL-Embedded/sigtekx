# .github/workflows/ci.yml

name: CI Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  cpu-checks:
    name: CPU Checks (Lint, Build, Test)
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install CUDA Toolkit 13.0.0
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.24
        id: cuda-toolkit
        with:
          cuda: '13.0.0'

      # 4. Configure and Build with the run-cmake Action
      - name: Configure and Build CMake Project
        uses: lukka/run-cmake@v10
        with:
          # Tell CMake where to find your CMakeLists.txt (the root)
          sourceDirectory: ${{ github.workspace }}
          # Use a temporary directory for build files
          buildDirectory: ${{ runner.temp }}/build
          # Pass your custom options directly to CMake
          cmakeOptions: "-DIONO_WITH_TESTS=OFF -DIONO_WITH_PYTHON=ON"

      # 5. Install Python dependencies
      - name: Install Python Dependencies
        run: pip install .[dev]

      # 6. Run linter
      - name: Run Ruff Linter
        run: ruff check python/src python/tests

      # 7. Run Python unit tests (excluding GPU tests)
      - name: Run Pytest (CPU-only)
        run: pytest -m "not gpu"