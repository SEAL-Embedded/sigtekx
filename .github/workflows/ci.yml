# .github/workflows/ci.yml

name: CI Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  docker-checks:
    name: Docker Checks (Lint, Build, Test, Scan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and cache Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: kevinrhz/ionosense-hpc:ci
          cache-from: type=registry,ref=kevinrhz/ionosense-hpc:cache
          cache-to: type=registry,ref=kevinrhz/ionosense-hpc:cache,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'kevinrhz/ionosense-hpc:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Add your linter and test steps here, running them against the built image
      - name: Run Ruff Linter
        run: docker run --rm kevinrhz/ionosense-hpc:ci ruff check python/

      - name: Run Pytest
        run: docker run --rm kevinrhz/ionosense-hpc:ci pytest -m "not gpu" --cov-fail-under=70