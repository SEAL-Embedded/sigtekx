name: sigtekx
channels:
  - nvidia
  - conda-forge
channel_priority: strict
dependencies:
  # Core
  - python=3.11
  - cmake>=3.26
  - ninja
  - gxx_linux-64=14.*

  # CUDA toolchain (NVCC + dev libs)
  - cuda-compiler=13.0
  - cuda-libraries-dev=13.0
  - cuda-nvtx-dev=13.0

  # C++ testing
  - gtest

  # Python stack - Core
  - numpy
  - pybind11
  - tqdm
  - colorama
  - scipy
  - pandas
  - matplotlib
  - jupyterlab
  - h5py
  
  # Python stack - API
  - pydantic>=2.0
  - pynvml
  
  # Testing
  - pytest
  - pytest-xdist
  - pytest-timeout
  
  # Dev Tools
  - pre-commit
  - pip
  - mypy
  - ruff
  - wheel
  - build
  - setuptools>=68
