name: ionosense-hpc
channels:
  - nvidia
  - conda-forge
channel_priority: strict
dependencies:
  # Core
  - python=3.11
  - cmake>=3.26
  - ninja

  # VS Build tools
  - vs2022_win-64

  # CUDA toolchain (NVCC + dev libs)
  - cuda-compiler=13.0
  - cuda-libraries-dev=13.0

  # Python stack - Core (existing)
  - numpy
  - pybind11
  - pytest
  - tqdm
  - colorama
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - jupyterlab
  - ipykernel
  - ipywidgets
  - h5py
  
  # Python stack - Added for API
  - pydantic>=2.0
  - pynvml
  
  # Testing (existing + additions)
  - pytest
  - pytest-xdist
  - pytest-timeout
  
  # Dev Tools (existing + additions)
  - pre-commit
  - pip
  - mypy
  - ruff
  - wheel
  - build
  - setuptools>=68