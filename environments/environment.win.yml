name: ionosense-hpc
channels:
  - nvidia
  - conda-forge
channel_priority: strict
dependencies:
  # Core
  - python=3.11
  - cmake>=3.26
  - ninja

  # Build tools
  - vs2022_win-64

  # CUDA toolchain (NVCC + dev libs)
  - cuda-compiler=13.0
  - cuda-libraries-dev=13.0
  - cuda-nvtx-dev=13.0

  # Scientific Python stack
  - numpy=1.26.*
  - scipy=1.13.*
  - pandas>=2.0
  - pybind11>=2.11
  - nvidia-ml-py>=11.5
  
  # Visualization
  - matplotlib>=3.6
  - seaborn>=0.12
  - jupyterlab>=4.1
  - ipykernel>=6.29
  - ipywidgets>=8.1
  - h5py>=3.10
  
  # Testing
  - pytest>=8.0
  - pytest-xdist>=3.5
  - pytest-timeout>=2.3
  - pytest-cov>=4.1
  
  # Code quality
  - pre-commit>=3.6
  - mypy>=1.10
  - ruff>=0.4
  
  # Build tools (Conda part)
  - wheel>=0.43
  - setuptools>=68
  
  # Additional utilities
  - tqdm>=4.66
  - colorama>=0.4.6
  - tabulate>=0.9
  
  # Modern research tools (let pip handle these)
  - pip>=23.0
  - pip:
    - build>=1.2

    # Research tools
    - hydra-core>=1.3.2
    - hydra-optuna-sweeper>=1.2.0
    - hydra-joblib-launcher>=1.2.0
    - mlflow>=2.10.0
    - dvc[all]>=3.47.0
    - snakemake>=8.0.0
    - omegaconf>=2.3.0
    
    # Additional Python packages
    - pydantic>=2.0
    - nvtx>=0.2.5
    
    # Documentation and reporting
    - jinja2>=3.1
    - markdown>=3.5
    - plotly>=5.18
    - kaleido>=0.2.1
    - papermill>=2.5
    - nbconvert>=7.16

