name: stress_test
description: Long-running stress test for stability validation

benchmarks:
  - name: throughput
    config:
      test_duration_s: 3600.0  # 1 hour
      monitor_gpu_utilization: true
      monitor_temperature: true
      monitor_power: true
      engine_config:
        nfft: 8192
        batch: 64
        warmup_iters: 100
  
  - name: latency
    config:
      iterations: 100000  # 100k iterations
      deadline_us: 150  # Tight deadline
      analyze_jitter: true
      engine_config:
        nfft: 2048
        batch: 4

# Monitoring and alerts
alert_on_deadline_miss: true
alert_threshold_percent: 1.0  # Alert if >1% deadline misses
temperature_limit_c: 85
power_limit_w: 350

output_dir: ./results/stress_test
save_interval: 1000  # Save every 1000 iterations
generate_report: true