name: throughput_scaling
iterations: 1  # Single sustained test per configuration
warmup_iterations: 0

# Throughput-specific settings
test_duration_s: 30.0
data_size_gb: null  # Use duration-based testing

# Scaling parameters
test_batch_sizes: [1, 2, 4, 8, 16, 32, 64, 128]
test_nfft_sizes: [256, 512, 1024, 2048, 4096, 8192]

# Memory analysis
measure_memory_bandwidth: true
measure_pcie_bandwidth: true

# Resource monitoring
monitor_gpu_utilization: true
monitor_temperature: true
monitor_power: true

# Engine configuration
engine_config:
  nfft: 4096
  batch: 32
  overlap: 0.5
  sample_rate_hz: 48000
  stream_count: 4
  pinned_buffer_count: 4
  warmup_iters: 5