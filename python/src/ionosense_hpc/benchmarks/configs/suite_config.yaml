name: comprehensive_suite
description: Full benchmark suite for publication-ready results

# Benchmarks to run in sequence
benchmarks:
  - name: latency
    config:
      iterations: 5000
      warmup_iterations: 500
      engine_config:
        nfft: 1024
        batch: 2
  
  - name: latency-streaming
    config:
      iterations: 10000
      warmup_iterations: 1000
      engine_config:
        nfft: 1024
        batch: 2
  
  - name: throughput
    config:
      test_duration_s: 60.0
      engine_config:
        nfft: 4096
        batch: 32
  
  - name: throughput-scaling
    config:
      test_batch_sizes: [1, 2, 4, 8, 16, 32, 64]
      test_nfft_sizes: [512, 1024, 2048, 4096]
  
  - name: accuracy
    config:
      iterations: 10
      validate_parseval: true
      validate_linearity: true
      validate_numerical_stability: true

# Global settings
output_dir: ./results/comprehensive
parallel: false  # Run sequentially for consistent results
generate_report: true
report_format: pdf
report_title: "Ionosense-HPC Comprehensive Performance Analysis"