name: latency_comprehensive
iterations: 5000
warmup_iterations: 500
confidence_level: 0.95
outlier_threshold: 3.0

# Latency-specific settings
measure_gpu_time: true
measure_components: false
test_signal_type: sine
test_frequency: 1000.0
deadline_us: 200.0
analyze_jitter: true

# Engine configuration
engine_config:
  nfft: 1024
  batch: 2
  overlap: 0.5
  sample_rate_hz: 48000
  stream_count: 3
  pinned_buffer_count: 2
  warmup_iters: 10
  enable_profiling: false

# Output settings
save_raw_data: true
output_format: json
verbose: true