# DVC Pipeline - Simple configuration that uses Snakemake
# Following one-tool-one-job principle: DVC tracks data, Snakemake orchestrates

stages:
  run_workflow:
    cmd: snakemake --cores 4 --snakefile experiments/Snakefile
    deps:
      - benchmarks/
      - experiments/Snakefile
      - experiments/conf/
      - experiments/scripts/
      - src/sigtekx/
    outs:
      - artifacts/data/:
          persist: true
      - artifacts/figures/:
          persist: true
      - artifacts/reports/:
          persist: true
    metrics:
      - artifacts/data/summary_statistics.csv:
          cache: false

  # Note: Individual stages removed - use Snakemake for granular orchestration
  # DVC focuses on high-level data tracking while Snakemake handles step dependencies
