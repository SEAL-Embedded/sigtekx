# The name of the conda environment for this project.
name: ionosense-hpc

# The channels Conda will search for packages, in order of priority.
channels:
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # 1. Core Build & Runtime Dependencies
  - python=3.11
  - cmake
  - ninja
  - pip
  - c-compiler
  - cxx-compiler

  # 2. CUDA Toolchain
  - cuda-compiler=13.0
  - cuda-libraries=13.0
  - cuda-nvcc=13.0
  - cuda-nvtx=13.0
  - libcufft-dev=12.0
  - cuda-cudart-dev=13.0

  # 3. Python packages for testing and bindings
  - numpy
  - pytest
  - pybind11
  - tqdm
  - colorama

  # 4. C++ Testing Framework
  - gtest 