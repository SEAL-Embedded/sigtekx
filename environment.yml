# The name of the conda environment for this project.
name: ionosense-hpc

# The channels Conda will search for packages, in order of priority.
channels:
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # 1. Core Build & Runtime Dependencies
  - python=3.11
  - cmake
  - pip
  - c-compiler
  - cxx-compiler

  # 2. CUDA Toolchain
  # We install the specific, required components, all pinned to the same
  # major.minor version for maximum stability and compatibility.
  - cuda-compiler=13.0
  - cuda-libraries=13.0
  - cuda-nvcc=13.0
  - cuda-nvtx=13.0
  - cuda-cufft=13.0        # Runtime library
  - cuda-cufft-dev=13.0    # Development headers - THIS WAS MISSING!
  - cuda-cudart=13.0       # CUDA runtime
  - cuda-cudart-dev=13.0   # CUDA runtime headers
  
  # 3. Python packages for testing and bindings
  - numpy
  - pytest
  - pybind11
  - tqdm
  - colorama