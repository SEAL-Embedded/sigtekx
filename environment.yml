# =============================================================================
# Conda Environment for the ionosense-hpc-lib Project
#
# To create/update, run: conda env update --name ionosense-hpc --file environment.yml
# =============================================================================
name: ionosense-hpc

channels:
  - nvidia      # Highest priority for official CUDA packages
  - conda-forge # Primary channel for a consistent cross-platform toolchain
  - defaults    # Fallback for any packages not in other channels

dependencies:
  # ---------------------------------------------------------------------------
  # 1. Core Language & Environment
  # ---------------------------------------------------------------------------
  - python=3.11
  - pip

  # ---------------------------------------------------------------------------
  # 2. Cross-Platform Build Toolchain
  #
  # Defines the compilers and build tools needed to compile the C++/CUDA code.
  # ---------------------------------------------------------------------------
  - cmake
  - ninja
  - c-compiler       # [linux] GCC toolchain on Linux
  - cxx-compiler     # [linux]
  - vs2022_win-64    # [win]   MSVC v143 toolchain on Windows

  # ---------------------------------------------------------------------------
  # 3. NVIDIA CUDA Toolkit
  #
  # Specifies the CUDA compiler and the development libraries (headers/libs)
  # needed for linking against cuFFT, cuDART, etc.
  # ---------------------------------------------------------------------------
  - cuda-compiler=13.0
  - cuda-libraries-dev=13.0  # Metapackage for all dev libs (cuFFT, cuBLAS, etc.)

  # ---------------------------------------------------------------------------
  # 4. C++ Libraries & Testing
  # ---------------------------------------------------------------------------
  - gtest

  # ---------------------------------------------------------------------------
  # 5. Core Python Libraries (for bindings, numerics, and HPC)
  # ---------------------------------------------------------------------------
  - numpy
  - pybind11

  # ---------------------------------------------------------------------------
  # 6. Utility Python Libraries (for scripting, testing, and UI)
  # ---------------------------------------------------------------------------
  - pytest
  - tqdm
  - colorama